run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - unused
    - gosimple
    - typecheck
    - gocritic
    - revive
    - forbidigo

linters-settings:
  revive:
    rules:
      - name: package-comments
        disabled: false
      - name: exported
        disabled: false
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"

  forbidigo:
    forbid:
      - p: ^func init\(\)$
        msg: "init() functions are banned per architecture rules (R10)"

  gosec:
    excludes:
      - G104

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocritic

  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
